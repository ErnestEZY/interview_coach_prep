<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/app.js"></script>
  <script>
    // Extract token from URL parameters
    function getResetInfo() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      return { token };
    }
  </script>
</head>
<body class="auth-page" x-data="{
    token: getResetInfo().token,
    email: 'Loading...',
    password: '',
    confirmPassword: '',
    async fetchEmail() {
      if (!this.token) return;
      try {
        const response = await fetch(`/api/auth/verify-token/${this.token}`);
        if (response.ok) {
          const data = await response.json();
          this.email = data.email;
        } else {
          throw new Error('Invalid token');
        }
      } catch (e) {
        Swal.fire({
          icon: 'error',
          title: 'Invalid Link',
          text: 'This reset link is expired or invalid.',
          confirmButtonText: 'Back to Login'
        }).then(() => window.location='/static/pages/login.html');
      }
    },
    get passwordCriteria() {
      return {
        length: this.password.length >= 8,
        upper: /[A-Z]/.test(this.password),
        lower: /[a-z]/.test(this.password),
        number: /[0-9]/.test(this.password),
        special: /[!@#$%^&*(),.?\&quot;:{}|<>]/.test(this.password)
      };
    },
    get passwordStrength() {
      if (!this.password) return { label: 'None', color: 'text-secondary', width: '0%', class: 'bg-secondary' };
      const criteria = this.passwordCriteria;
      const metCount = Object.values(criteria).filter(Boolean).length;
      if (metCount <= 2) return { label: 'Weak', color: 'text-danger', width: '33%', class: 'bg-danger' };
      if (metCount <= 4) return { label: 'Medium', color: 'text-warning', width: '66%', class: 'bg-warning' };
      return { label: 'Strong', color: 'text-success', width: '100%', class: 'bg-success' };
    }
  }" x-init="
    if(!token) { 
      Swal.fire({
        icon: 'error',
        title: 'Invalid Link',
        text: 'This reset link is missing or invalid.',
        confirmButtonText: 'Back to Login'
      }).then(() => window.location='/static/pages/login.html');
    } else {
      fetchEmail();
    }
  ">
  <nav class="navbar navbar-dark glass-nav">
    <div class="container d-flex align-items-center">
      <div class="d-flex align-items-center gap-3">
        <a class="navbar-brand fw-bold fs-4 mb-0 me-0" href="/">
          <span class="text-primary">I</span>CP
        </a>
        <a class="btn btn-outline-light btn-sm px-3" href="/static/pages/login.html">Login</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="auth-card p-4 p-md-5 animate-fade-in">
          <h2 class="auth-header mb-2">Reset Password</h2>
          <div class="mb-4 text-center">
            <span class="text-secondary small">Resetting password for:</span><br>
            <span class="fw-bold text-primary" x-text="email"></span>
          </div>
          
          <form hx-post="/api/auth/reset-password" hx-ext="json-enc" hx-trigger="submit" hx-swap="none"
                hx-on::before-request="
                  if(password !== confirmPassword) {
                    event.preventDefault();
                    Swal.fire({
                      icon: 'error',
                      title: 'Error',
                      text: 'Passwords do not match'
                    });
                    return;
                  }
                  const criteria = Object.values(passwordCriteria);
                  if(!criteria.every(Boolean)) {
                    event.preventDefault();
                    Swal.fire({
                      icon: 'error',
                      title: 'Weak Password',
                      text: 'Please meet all password criteria.'
                    });
                    return;
                  }
                  Swal.fire({
                    title: 'Updating Password...',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                  });
                "
                hx-on::after-request="
                  if(event.detail.successful){
                    Swal.fire({
                      icon: 'success',
                      title: 'Password Updated!',
                      text: 'Your password has been changed successfully. You can now login.',
                      confirmButtonText: 'Login'
                    }).then(() => {
                      window.location='/static/pages/login.html';
                    });
                  } else {
                    let msg = 'Failed to update password';
                    try {
                      const res = JSON.parse(event.detail.xhr.response);
                      msg = res.detail || msg;
                    } catch(e){}
                    Swal.fire({
                      icon: 'error',
                      title: 'Update Failed',
                      text: msg
                    });
                  }
                ">
            <input type="hidden" name="token" :value="token">
            
            <div class="mb-4">
              <label class="form-label text-secondary small text-uppercase fw-bold">New Password</label>
              <div class="input-group input-group-lg" x-data="{show: false}">
                <input name="password" :type="show ? 'text' : 'password'" class="form-control" placeholder="New password" required maxlength="12"
                       x-model="password">
                <button class="btn password-toggle-btn" type="button" @click="show = !show" title="Toggle password visibility">
                  <i class="bi" :class="show ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
              
              <!-- Password Strength Indicator -->
              <div class="mt-2" x-show="password">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <span class="small text-secondary">Strength: <span class="fw-bold" :class="passwordStrength.color" x-text="passwordStrength.label"></span></span>
                </div>
                <div class="progress password-strength-progress">
                  <div class="progress-bar transition-all" role="progressbar" 
                       title="'Password Strength: ' + passwordStrength.label"
                       :style="'width: ' + passwordStrength.width" :class="passwordStrength.class"></div>
                </div>
              </div>

              <!-- Password Criteria List -->
              <div class="mt-3 p-3 rounded-3 password-criteria-list">
                <ul class="list-unstyled mb-0 small">
                  <li class="d-flex align-items-center mb-1" :class="passwordCriteria.length ? 'text-success' : 'text-secondary'">
                    <i class="bi me-2" :class="passwordCriteria.length ? 'bi-check-circle-fill' : 'bi-circle'"></i>
                    <b>At least 8 characters</b>
                  </li>
                  <li class="d-flex align-items-center mb-1" :class="passwordCriteria.upper ? 'text-success' : 'text-secondary'">
                    <i class="bi me-2" :class="passwordCriteria.upper ? 'bi-check-circle-fill' : 'bi-circle'"></i>
                    <b>Contains uppercase letter</b>
                  </li>
                  <li class="d-flex align-items-center mb-1" :class="passwordCriteria.lower ? 'text-success' : 'text-secondary'">
                    <i class="bi me-2" :class="passwordCriteria.lower ? 'bi-check-circle-fill' : 'bi-circle'"></i>
                    <b>Contains lowercase letter</b>
                  </li>
                  <li class="d-flex align-items-center mb-1" :class="passwordCriteria.number ? 'text-success' : 'text-secondary'">
                    <i class="bi me-2" :class="passwordCriteria.number ? 'bi-check-circle-fill' : 'bi-circle'"></i>
                    <b>Contains number</b>
                  </li>
                  <li class="d-flex align-items-center" :class="passwordCriteria.special ? 'text-success' : 'text-secondary'">
                    <i class="bi me-2" :class="passwordCriteria.special ? 'bi-check-circle-fill' : 'bi-circle'"></i>
                    <b>Contains special character</b>
                  </li>
                </ul>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label text-secondary small text-uppercase fw-bold">Confirm New Password</label>
              <div class="input-group input-group-lg" x-data="{show: false}">
                <input name="confirmPassword" :type="show ? 'text' : 'password'" class="form-control" placeholder="Confirm new password" required maxlength="12"
                       x-model="confirmPassword">
                <button class="btn password-toggle-btn" type="button" @click="show = !show" title="Toggle password visibility">
                  <i class="bi" :class="show ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
              <div class="mt-1" x-show="confirmPassword">
                <span class="small" :class="password === confirmPassword ? 'text-success' : 'text-danger'">
                  <i class="bi me-1" :class="password === confirmPassword ? 'bi-check-circle-fill' : 'bi-x-circle-fill'"></i>
                  <span x-text="password === confirmPassword ? 'Passwords match' : 'Passwords do not match'"></span>
                </span>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
