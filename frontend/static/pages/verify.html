<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify Email</title>
  <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-page">
  <!-- Scripts at start of body for faster execution -->
  <script src="/static/js/app.js?v=1.8"></script>

  <nav class="navbar navbar-dark glass-nav">
    <div class="container d-flex align-items-center">
      <div class="d-flex align-items-center gap-3">
        <a class="navbar-brand fw-bold fs-4 mb-0 me-0" href="/">
          <span class="text-primary">I</span>CP
        </a>
        <a class="btn btn-outline-light btn-sm px-3" href="/static/pages/register.html">Register</a>
      </div>
    </div>
  </nav>

  <div id="app" class="container py-5" v-cloak>
    <div class="row justify-content-center">
        <div class="col-md-6">
        <div class="auth-card p-4 p-md-5 animate-fade-in">
          <h2 class="auth-header mb-2">Verify Your Email</h2>
          <p class="text-secondary mb-4 small">Please enter the 6-digit OTP sent to your email.</p>
          
          <form @submit.prevent="submit">
            <div class="mb-4">
              <label class="form-label text-secondary small text-uppercase fw-bold">Email Address</label>
              <input name="email" type="email" class="form-control form-control-lg" v-model="email" required readonly title="Email Address" placeholder="user@example.com" maxlength="80">
            </div>
            
            <div class="mb-4">
              <label class="form-label text-secondary small text-uppercase fw-bold">OTP Code</label>
              <div class="otp-visual" @click="focusOtp">
                <div class="otp-box" v-for="n in 6" :key="n">
                  <span :class="{'otp-placeholder': !otp[n-1]}">{{ otp[n-1] || '0' }}</span>
                </div>
                <input ref="otpInput" name="otp" type="text" class="otp-input-overlay"
                       title="Please enter the 6-digit OTP sent to your email"
                       maxlength="6" pattern="\d{6}" required
                       v-model="otp" @input="validateOtp" autocomplete="one-time-code">
              </div>
            </div>

            <div class="position-relative mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" :disabled="submitting" :class="{'opacity-50': otp.length < 6}">
                  <span v-if="submitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  <span v-else>Verify Account</span>
                </button>
                <div v-if="otp.length < 6" class="btn-overlay-trigger" @click="promptFields"></div>
              </div>
          </form>

          <div class="text-center mt-4">
            <!-- Attempt indicator -->
            <p v-if="!locked && attemptsLeft < MAX_ATTEMPTS" class="small mb-2 otp-attempt-warning">
              <i class="bi bi-exclamation-triangle-fill me-1"></i>
              {{ attemptsLeft }} attempt{{ attemptsLeft !== 1 ? 's' : '' }} remaining
            </p>

            <!-- Resend OTP row -->
            <p class="text-secondary small mb-0">
              Didn't receive a code?
              <button
                type="button"
                class="btn btn-link btn-sm p-0 fw-bold text-decoration-none resend-btn-base"
                :class="[resendDisabled ? 'text-secondary resend-btn-disabled-state' : 'text-primary']"
                :disabled="resendDisabled"
                :aria-disabled="resendDisabled"
                @click="resendOtp"
              >
                Resend Code
              </button>
              <span v-if="resendCooldown > 0" class="ms-1 text-secondary resend-cooldown">
                ({{ resendCooldown }}s)
              </span>
            </p>

            <!-- Wrong email fallback -->
            <p class="text-secondary small mt-2 mb-0">
              Still not receiving it? <a href="/static/pages/register.html" class="text-primary fw-bold text-decoration-none">Try registering again</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="/static/js/email_service.js"></script>
  <script src="/static/js/verify.js"></script>
</body>
</html>
