<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Session - ICP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
    p  { font-size: 14px; color: #94a3b8; margin: 0 0 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      background: #6366f1;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .status { font-size: 13px; color: #64748b; margin-top: 20px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔄</div>
    <h1>Session Reset</h1>
    <p>This will clear all cached data, service workers, and your session token — then take you back to the login page for a completely fresh start.</p>
    <button class="btn" id="resetBtn" onclick="doReset()">Reset &amp; Restart</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function doReset() {
      const btn = document.getElementById('resetBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Resetting…';

      status.textContent = 'Clearing localStorage…';
      try { localStorage.clear(); } catch(_) {}

      status.textContent = 'Clearing sessionStorage…';
      try { sessionStorage.clear(); } catch(_) {}

      status.textContent = 'Unregistering service workers…';
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      } catch(_) {}

      status.textContent = 'Clearing caches…';
      try {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      } catch(_) {}

      status.textContent = 'Done! Redirecting to login…';
      setTimeout(() => {
        window.location.replace('/static/pages/login.html');
      }, 800);
    }
  </script>
</body>
</html>
