name: ICP - CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Backend Tests ────────────────────────────────────────────────────
  # Runs on every push and PR. Deployment is blocked if any test fails.
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install wkhtmltopdf (system dependency for PDF generation)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y wget curl ca-certificates fontconfig libfreetype6 libxrender1 libxext6 libx11-6 xz-utils libglib2.0-0 libxrandr2 libgdk-pixbuf2.0-0 libnss3 libxcomposite1 libxdamage1 libxss1 libxtst6 libxkbcommon-x11-0 libjpeg-turbo8 libpng16-16 libssl3
          if ! sudo apt-get install -y wkhtmltopdf; then
            echo "apt install wkhtmltopdf failed or not available, trying official .deb releases"
            WKDEB=""
            for tag in bookworm bullseye buster; do
              url="https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6-1/wkhtmltox_0.12.6-1.${tag}_amd64.deb"
              echo "Trying $url"
              if curl -fsSL -o /tmp/wkhtml.deb "$url"; then
                WKDEB=/tmp/wkhtml.deb
                break
              fi
            done
            if [ -n "$WKDEB" ]; then
              sudo dpkg -i "$WKDEB" || (sudo apt-get update && sudo apt-get install -y -f)
              rm -f "$WKDEB"
            else
              echo "Could not install wkhtmltopdf via .deb; trying linux-generic tarball"
              TARBALL_URL="https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6-1/wkhtmltox_0.12.6-1_linux-generic-amd64.tar.xz"
              curl -fsSL -o /tmp/wkhtml.tar.xz "$TARBALL_URL"
              mkdir -p /tmp/wkhtml_install
              tar -xJf /tmp/wkhtml.tar.xz -C /tmp/wkhtml_install
              WKHTML_BIN=$(find /tmp/wkhtml_install -type f -name wkhtmltopdf | head -n 1)
              if [ -n "$WKHTML_BIN" ]; then
                sudo cp "$WKHTML_BIN" /usr/local/bin/
                sudo chmod +x /usr/local/bin/wkhtmltopdf
                sudo ln -sf /usr/local/bin/wkhtmltopdf /usr/bin/wkhtmltopdf
                echo "Installed wkhtmltopdf from tarball: $WKHTML_BIN"
              else
                echo "Tarball extracted but wkhtmltopdf binary not found"
                find /tmp/wkhtml_install -maxdepth 3 -type f | sort
              fi
              rm -rf /tmp/wkhtml* || true
            fi
          fi
          command -v wkhtmltopdf
          wkhtmltopdf --version
          ldd "$(command -v wkhtmltopdf)" | grep 'not found' || true

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Verify wkhtmltopdf + pdfkit
        run: |
          python - <<'PY'
          import pdfkit, tempfile, os
          html = "<html><body><p>CI wkhtmltopdf smoke test</p></body></html>"
          with tempfile.NamedTemporaryFile("w", suffix=".html", delete=False, encoding="utf-8") as f:
              f.write(html)
              file_path = f.name
          try:
              pdf = pdfkit.from_file(file_path, False)
              if not isinstance(pdf, (bytes, bytearray)) or not pdf.startswith(b"%PDF"):
                  raise SystemExit("wkhtmltopdf smoke test failed: generated output is not a PDF")
          finally:
              os.unlink(file_path)
          print("wkhtmltopdf/pdfkit smoke test passed")
          PY

      - name: Unit Tests
        run: python -m pytest tests/unit/ -v --tb=short --junitxml=test-results/unit.xml
        env:
          JWT_SECRET: pytest-secret-key
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: icp_test
          MISTRAL_API_KEY: fake-key
          RATE_LIMIT_PER_MINUTE: "9999"
          ADMIN_INVITE_CODE: test-invite-123

      - name: Smoke Tests
        run: python -m pytest tests/smoke/ -v --tb=short --junitxml=test-results/smoke.xml
        env:
          JWT_SECRET: pytest-secret-key
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: icp_test
          MISTRAL_API_KEY: fake-key
          RATE_LIMIT_PER_MINUTE: "9999"
          ADMIN_INVITE_CODE: test-invite-123

      - name: Integration Tests
        run: python -m pytest tests/integration/ -v --tb=short --junitxml=test-results/integration.xml
        env:
          JWT_SECRET: pytest-secret-key
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: icp_test
          MISTRAL_API_KEY: fake-key
          RATE_LIMIT_PER_MINUTE: "9999"
          ADMIN_INVITE_CODE: test-invite-123

      - name: Security Tests
        run: python -m pytest tests/security/ -v --tb=short --junitxml=test-results/security.xml
        env:
          JWT_SECRET: pytest-secret-key
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: icp_test
          MISTRAL_API_KEY: fake-key
          RATE_LIMIT_PER_MINUTE: "9999"
          ADMIN_INVITE_CODE: test-invite-123

      - name: Functional Tests
        run: python -m pytest tests/functional/ -v --tb=short --junitxml=test-results/functional.xml
        env:
          JWT_SECRET: pytest-secret-key
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: icp_test
          MISTRAL_API_KEY: fake-key
          RATE_LIMIT_PER_MINUTE: "9999"
          ADMIN_INVITE_CODE: test-invite-123

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  # ── Job 2: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Ruff lint (warn only)
        run: ruff check backend/ --output-format=github || true

  # ── Job 3: Dependency Security Scan ─────────────────────────────────────────
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: Audit dependencies (warn only)
        run: pip-audit -r backend/requirements.txt --output json > audit.json || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: audit.json

  # ── Job 4: Android APK Build (manual only) ──────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build APK
        working-directory: mobile_app
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk

  # ── Job 5: Windows Desktop Build (manual only) ──────────────────────────────
  build-windows:
    name: Build Windows Desktop (Tauri)
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: npm run build:desktop
      - uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-app
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
